name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Test
        run: |
          xcodebuild test \
            -project "OpenCode Stats.xcodeproj" \
            -scheme "OpenCode Stats" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
